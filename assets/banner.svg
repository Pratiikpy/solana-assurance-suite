<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500" font-family="Inter, 'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9945FF"/>
      <stop offset="0.55" stop-color="#5B8DEF"/>
      <stop offset="1" stop-color="#14F195"/>
    </linearGradient>
    <radialGradient id="bg" cx="22%" cy="30%" r="95%">
      <stop offset="0" stop-color="#16161E"/>
      <stop offset="1" stop-color="#08080B"/>
    </radialGradient>
  </defs>
  <rect width="1500" height="500" fill="url(#bg)"/>
  <rect x="0" y="496" width="1500" height="4" fill="url(#g)"/>

  <!-- shield mark -->
  <g transform="translate(70,118) scale(0.55)">
    <path d="M256 78 L418 148 V302 C418 374 346 414 256 444 C166 414 94 374 94 302 V148 Z"
          fill="none" stroke="url(#g)" stroke-width="20" stroke-linejoin="round"/>
    <path d="M190 256 L240 306 L332 192" fill="none" stroke="url(#g)"
          stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- wordmark -->
  <text x="270" y="205" fill="#FFFFFF" font-size="78" font-weight="700" letter-spacing="-1">Solana Assurance Suite</text>
  <text x="272" y="258" fill="#AEB0BE" font-size="30" font-weight="400">The verification &amp; ship-safety layer for Solana</text>
  <text x="272" y="300" fill="url(#g)" font-size="27" font-weight="600">Every skill ships a runnable proof.</text>

  <!-- skills line -->
  <text x="272" y="372" fill="#7C7E8C" font-size="24" letter-spacing="0.5">testing&#160;&#160;·&#160;&#160;qa-automation&#160;&#160;·&#160;&#160;sybil-defense&#160;&#160;·&#160;&#160;attestations&#160;&#160;·&#160;&#160;agent-eval&#160;&#160;·&#160;&#160;bridge</text>

  <!-- proofs pill -->
  <g transform="translate(1190,70)">
    <rect x="0" y="0" width="250" height="56" rx="28" fill="none" stroke="url(#g)" stroke-width="2.5"/>
    <circle cx="38" cy="28" r="8" fill="#14F195"/>
    <text x="62" y="36" fill="#E7E8EE" font-size="24" font-weight="600">8 proofs · all green</text>
  </g>
</svg>
